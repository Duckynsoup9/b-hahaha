<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        <div class="scoreboard">
            <div class="score">
                <span>Player</span>
                <span id="playerScore">0</span>
            </div>
            <div class="score">
                <span>Computer</span>
                <span id="computerScore">0</span>
            </div>
        </div>
        
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        
        <div class="instructions">
            <p><strong>Controls:</strong> Use Mouse Y position or ↑↓ Arrow Keys to move your paddle</p>
            <p>Press <strong>SPACEBAR</strong> to start/restart the game</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
